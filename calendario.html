<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendario de Cumpleaños y Aniversarios</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Nunito:wght@400;600;700;800;900&display=swap');

    :root {
      --paper: #fff8dc;
      --paper-dark: #f4e7ba;
      --ink: #2f2a24;
      --muted: #756c5d;
      --line: rgba(65, 90, 140, 0.20);
      --red-line: rgba(230, 92, 92, 0.48);
      --spiral: #6d5d4a;

      --birthday: #ffb347;
      --anniversary: #c084fc;

      --db: #ff9f1c;
      --inazuma: #3b82f6;
      --pokemon: #ef4444;
      --other: #64748b;

      --shadow: 0 28px 80px rgba(48, 34, 16, 0.28);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: 'Nunito', sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 10%, rgba(255,255,255,.55), transparent 26%),
        radial-gradient(circle at 80% 20%, rgba(255,210,140,.34), transparent 30%),
        linear-gradient(135deg, #caa574, #8f6741 55%, #62462e);
      padding: 30px;
    }

    .app {
      max-width: 1680px;
      margin: 0 auto;
      position: relative;
      border-radius: 32px;
      padding: 42px 42px 52px 86px;
      background:
        linear-gradient(90deg, transparent 0 56px, var(--red-line) 57px, transparent 60px),
        repeating-linear-gradient(0deg, var(--paper) 0 36px, var(--line) 37px),
        linear-gradient(135deg, var(--paper), var(--paper-dark));
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 2px solid rgba(84, 54, 26, .25);
    }

    .app::before {
      content: "";
      position: absolute;
      left: 24px;
      top: 28px;
      bottom: 28px;
      width: 22px;
      background: repeating-linear-gradient(
        0deg,
        transparent 0 20px,
        var(--spiral) 21px 34px,
        transparent 35px 54px
      );
      filter: drop-shadow(2px 2px 0 rgba(0,0,0,.18));
      opacity: .92;
    }

    .app::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 30%, transparent, rgba(80, 45, 10, .10));
      pointer-events: none;
    }

    header {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 22px;
      align-items: center;
      margin-bottom: 32px;
    }

    .title-block h1 {
      font-family: 'Patrick Hand', cursive;
      font-size: clamp(3.1rem, 5.8vw, 6.4rem);
      line-height: .92;
      color: #36291f;
      text-shadow: 2px 2px 0 rgba(255,255,255,.45);
      transform: rotate(-1deg);
    }

    .title-block p {
      margin-top: 10px;
      color: var(--muted);
      font-size: 1.25rem;
      font-weight: 900;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 12px;
      max-width: 650px;
    }

    .chip,
    .tool {
      border: 2px solid rgba(60, 44, 28, .25);
      background: rgba(255,255,255,.48);
      color: var(--ink);
      border-radius: 999px;
      padding: 12px 16px;
      font-weight: 900;
      font-size: 1rem;
      box-shadow: 0 6px 0 rgba(69, 48, 24, .13);
      backdrop-filter: blur(6px);
      outline: none;
    }

    .tool {
      min-width: 180px;
    }

    #searchInput {
      min-width: 260px;
    }

    .legend {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 14px 18px;
      margin-bottom: 26px;
      color: var(--muted);
      font-weight: 900;
      font-size: 1.08rem;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,.25);
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(80,55,30,.14);
    }

    .dot {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      display: inline-block;
      border: 2px solid rgba(0,0,0,.12);
    }

    .birthday-dot { background: var(--birthday); }
    .anniversary-dot { background: var(--anniversary); }
    .db-dot { background: var(--db); }
    .inazuma-dot { background: var(--inazuma); }
    .pokemon-dot { background: var(--pokemon); }

    .months-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 26px;
    }

    .months-grid.single-month {
      grid-template-columns: 1fr;
    }

    .view-controls {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 22px;
    }

    .view-controls .chip {
      margin: 0;
    }

    .view-controls .tool {
      min-width: auto;
    }

    .month {
      background: rgba(255, 252, 235, .66);
      border: 2px solid rgba(86, 61, 35, .18);
      border-radius: 26px;
      padding: 24px;
      box-shadow: 9px 11px 0 rgba(105, 72, 35, .12);
      position: relative;
      overflow: visible;
    }

    .month::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 10px;
      background: linear-gradient(90deg, #e96b81, #5ba8ff, #ffcb47);
      opacity: .72;
    }

    .month h2 {
      font-family: 'Patrick Hand', cursive;
      font-size: 2.45rem;
      margin: 4px 0 14px;
      color: #493326;
      text-transform: capitalize;
    }

    .weekdays,
    .days {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      grid-auto-rows: minmax(94px, auto);
      gap: 10px;
    }

    .weekdays div {
      text-align: center;
      font-size: .94rem;
      color: var(--muted);
      font-weight: 1000;
    }

    .day {
      min-height: 94px;
      width: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
      border-radius: 18px;
      padding: 10px;
      background: rgba(255,255,255,.45);
      border: 1px dashed rgba(88, 66, 42, .18);
      position: relative;
      transition: transform .15s ease, background .15s ease, box-shadow .15s ease;
      cursor: default;
      font-family: 'Nunito', sans-serif;
      text-align: left;
      color: var(--ink);
    }

    .day.has-events {
      cursor: pointer;
    }

    .day.has-events:hover {
      transform: translateY(-3px) rotate(-.35deg);
      background: rgba(255,255,255,.80);
      box-shadow: 0 10px 20px rgba(83, 55, 27, .14);
    }

    .day.empty {
      background: transparent;
      border-color: transparent;
      pointer-events: none;
    }

    .number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 32px;
      height: 32px;
      padding: 0 8px;
      font-weight: 1000;
      font-size: 1.05rem;
      border-radius: 999px;
      color: #453528;
    }

    .today .number {
      background: #2f2a24;
      color: #fff8dc;
    }

    .events {
      margin-top: 6px;
      display: grid;
      gap: 5px;
    }

    .event {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 5px;
      width: 100%;
      border-radius: 11px;
      padding: 5px 7px;
      text-align: left;
      font-size: .77rem;
      font-weight: 1000;
      line-height: 1.05;
      color: #33281f;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      box-shadow: inset 0 -2px rgba(0,0,0,.10);
      border-left: 6px solid var(--other);
    }

    .event-name {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .event.birthday {
      background: var(--birthday);
    }

    .event.anniversary {
      background: var(--anniversary);
      color: white;
    }

    .event.universe-dragonball { border-left-color: var(--db); }
    .event.universe-inazuma { border-left-color: var(--inazuma); }
    .event.universe-pokemon { border-left-color: var(--pokemon); }
    .event.universe-other { border-left-color: var(--other); }

    .event.hidden-by-filter {
      display: none;
    }

    .universe-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 22px;
      border-radius: 999px;
      background: rgba(255,255,255,.45);
      border: 1px solid rgba(0,0,0,.12);
      font-size: .78rem;
      flex-shrink: 0;
    }

    dialog {
      width: min(620px, calc(100vw - 32px));
      border: 0;
      border-radius: 28px;
      padding: 0;
      background: transparent;
      position: fixed;
      inset: 50% auto auto 50%;
      transform: translate(-50%, -50%);
      margin: 0;
    }

    dialog::backdrop {
      background: rgba(33, 24, 16, .58);
      backdrop-filter: blur(5px);
    }

    .modal-card {
      background:
        linear-gradient(90deg, transparent 0 44px, rgba(230,92,92,.36) 45px, transparent 48px),
        repeating-linear-gradient(0deg, #fff9df 0 34px, rgba(65,90,140,.18) 35px),
        #fff9df;
      border: 2px solid rgba(54, 38, 24, .25);
      border-radius: 28px;
      padding: 34px 34px 34px 68px;
      box-shadow: 0 28px 80px rgba(0,0,0,.38);
      color: var(--ink);
      position: relative;
    }

    .modal-card h3 {
      font-family: 'Patrick Hand', cursive;
      font-size: 3rem;
      margin-bottom: 6px;
    }

    .modal-date {
      font-weight: 1000;
      color: var(--muted);
      margin-bottom: 20px;
      font-size: 1.1rem;
    }

    .modal-list {
      display: grid;
      gap: 14px;
    }

    .modal-event {
      border-radius: 20px;
      padding: 16px;
      border: 2px solid rgba(70, 49, 29, .16);
      background: rgba(255,255,255,.50);
      border-left: 10px solid var(--other);
    }

    .modal-event.universe-dragonball { border-left-color: var(--db); }
    .modal-event.universe-inazuma { border-left-color: var(--inazuma); }
    .modal-event.universe-pokemon { border-left-color: var(--pokemon); }
    .modal-event.universe-other { border-left-color: var(--other); }

    .modal-event strong {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.28rem;
      margin-bottom: 6px;
    }

    .modal-event p {
      color: var(--muted);
      font-weight: 800;
      font-size: 1rem;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 10px;
      background: rgba(47,42,36,.08);
      font-weight: 1000;
      font-size: .9rem;
    }

    .close-btn {
      margin-top: 22px;
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 14px 18px;
      background: #2f2a24;
      color: white;
      font-size: 1.03rem;
      font-weight: 1000;
      cursor: pointer;
      box-shadow: 0 7px 0 rgba(0,0,0,.18);
    }

    .close-btn:hover {
      transform: translateY(-1px);
    }

    .footer-note {
      position: relative;
      z-index: 1;
      margin-top: 30px;
      color: rgba(47, 42, 36, .76);
      font-weight: 900;
      text-align: center;
      font-size: 1.05rem;
    }

    @media (max-width: 1360px) {
      .months-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 980px) {
      body {
        padding: 14px;
      }

      .app {
        padding: 28px 16px 30px 24px;
        border-radius: 28px;
      }

      header {
        grid-template-columns: 1fr;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .view-controls {
        justify-content: space-between;
      }

      .months-grid {
        grid-template-columns: 1fr;
      }

      .tool,
      #searchInput {
        min-width: 100%;
        width: 100%;
      }

      .month {
        padding: 18px;
      }

      .weekdays,
      .days {
        grid-auto-rows: minmax(78px, auto);
        gap: 8px;
      }

      .day {
        min-height: 78px;
        padding: 8px;
      }

      .number {
        min-width: 28px;
        height: 28px;
        font-size: 1rem;
      }

      .event {
        font-size: .72rem;
        padding: 4px 6px;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 10px;
      }

      .app {
        padding: 20px 16px 24px 18px;
        border-radius: 20px;
      }

      .app::before {
        left: 10px;
      }

      .toolbar,
      .view-controls {
        gap: 10px;
      }

      .months-grid {
        grid-template-columns: 1fr;
      }

      .day {
        min-height: 72px;
      }

      .title-block h1 {
        font-size: 2.8rem;
      }

      .title-block p,
      .legend,
      .close-btn,
      .chip,
      .tool {
        font-size: .95rem;
      }

      .modal-card {
        padding: 24px 18px 24px 32px;
      }

      .event {
        grid-template-columns: auto 1fr;
        gap: 4px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <header>
      <div class="title-block">
        <h1>Calendario de Recuerdos</h1>
        <p>Cumpleaños, aniversarios y fechas importantes de todo el año.</p>
      </div>

      <div class="toolbar">
        <span class="chip" id="yearLabel"></span>

        <select class="tool" id="typeFilter" aria-label="Filtrar por tipo de evento">
          <option value="all">Todo</option>
          <option value="birthday">Cumpleaños</option>
          <option value="anniversary">Aniversarios</option>
        </select>

        <select class="tool" id="universeFilter" aria-label="Filtrar por universo">
          <option value="all">Todos los universos</option>
          <option value="dragonball">Dragon Ball</option>
          <option value="inazuma">Inazuma Eleven</option>
          <option value="pokemon">Pokémon</option>
          <option value="other">Otros</option>
        </select>

        <input class="tool" id="searchInput" type="search" placeholder="Buscar personaje..." />
      </div>
    </header>

    <section class="legend" aria-label="Leyenda">
      <span><i class="dot birthday-dot"></i> Cumpleaños</span>
      <span><i class="dot anniversary-dot"></i> Aniversario</span>
      <span><i class="dot db-dot"></i> Dragon Ball</span>
      <span><i class="dot inazuma-dot"></i> Inazuma</span>
      <span><i class="dot pokemon-dot"></i> Pokémon</span>
      <span><i class="dot" style="background:#2f2a24"></i> Hoy</span>
    </section>

    <div class="view-controls">
      <button class="tool" id="viewModeButton" type="button">Vista mes</button>
      <button class="tool" id="prevMonth" type="button">Anterior</button>
      <span class="chip" id="activeMonthLabel"></span>
      <button class="tool" id="nextMonth" type="button">Siguiente</button>
    </div>

    <section class="months-grid" id="calendar" aria-label="Calendario anual"></section>

    <p class="footer-note">
      Edita el array <strong>EVENTOS</strong> del JavaScript para añadir tus fechas desde el código.
    </p>
  </main>

  <dialog id="eventModal">
    <div class="modal-card">
      <h3 id="modalTitle">Fecha</h3>
      <p class="modal-date" id="modalDate"></p>
      <div class="modal-list" id="modalList"></div>
      <button class="close-btn" id="closeModal">Cerrar libreta</button>
    </div>
  </dialog>

    const calendar = document.getElementById('calendar');
    const yearLabel = document.getElementById('yearLabel');
    const typeFilter = document.getElementById('typeFilter');
    const universeFilter = document.getElementById('universeFilter');
    const searchInput = document.getElementById('searchInput');
    const viewModeButton = document.getElementById('viewModeButton');
    const prevMonth = document.getElementById('prevMonth');
    const nextMonth = document.getElementById('nextMonth');
    const activeMonthLabel = document.getElementById('activeMonthLabel');

    const modal = document.getElementById('eventModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalDate = document.getElementById('modalDate');
    const modalList = document.getElementById('modalList');
    const closeModal = document.getElementById('closeModal');

    const CURRENT_YEAR = new Date().getFullYear();
    const TODAY = new Date();

    const MONTHS = [
      'enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio',
      'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'
    ];

    const WEEKDAYS = ['L', 'M', 'X', 'J', 'V', 'S', 'D'];

    const TYPE_INFO = {
      birthday: {
        label: 'Cumpleaños',
        icon: '🎂'
      },
      anniversary: {
        label: 'Aniversario',
        icon: '💜'
      }
    };

    const UNIVERSE_INFO = {
      dragonball: {
        label: 'Dragon Ball',
        icon: '🐉',
        className: 'universe-dragonball'
      },
      inazuma: {
        label: 'Inazuma Eleven',
        icon: '⚽',
        className: 'universe-inazuma'
      },
      pokemon: {
        label: 'Pokémon',
        icon: '🌟',
        className: 'universe-pokemon'
      },
      other: {
        label: 'Otro',
        icon: '📌',
        className: 'universe-other'
      }
    };

    yearLabel.textContent = CURRENT_YEAR;

    function normalizeText(text) {
      return String(text)
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '');
    }

    function getTypeInfo(type) {
      return TYPE_INFO[type] || TYPE_INFO.birthday;
    }

    function getUniverseInfo(universe) {
      return UNIVERSE_INFO[universe] || UNIVERSE_INFO.other;
    }

    function getEventsForDay(day, month) {
      return EVENTOS.filter(event => event.day === day && event.month === month);
    }

    function eventMatchesFilters(event) {
      const selectedType = typeFilter.value;
      const selectedUniverse = universeFilter.value;
      const search = normalizeText(searchInput.value.trim());

      const typeMatches = selectedType === 'all' || event.type === selectedType;
      const universeMatches = selectedUniverse === 'all' || event.universe === selectedUniverse;
      const searchMatches = !search || normalizeText(event.name + ' ' + (event.note || '')).includes(search);

      return typeMatches && universeMatches && searchMatches;
    }

    function openDayModal(day, month, events) {
      const visibleEvents = events.filter(eventMatchesFilters);
      if (!visibleEvents.length) return;

      modalTitle.textContent = `${day} de ${MONTHS[month - 1]}`;
      modalDate.textContent = `${visibleEvents.length} recuerdo${visibleEvents.length === 1 ? '' : 's'} apuntado${visibleEvents.length === 1 ? '' : 's'}`;
      modalList.innerHTML = '';

      visibleEvents.forEach(event => {
        const typeInfo = getTypeInfo(event.type);
        const universeInfo = getUniverseInfo(event.universe);

        const article = document.createElement('article');
        article.className = `modal-event ${universeInfo.className}`;
        article.innerHTML = `
          <strong>
            <span>${typeInfo.icon}</span>
            <span>${event.name}</span>
          </strong>

          <p>${event.note || 'Sin nota añadida.'}</p>

          <div class="meta-row">
            <span class="pill">${typeInfo.icon} ${typeInfo.label}</span>
            <span class="pill">${universeInfo.icon} ${universeInfo.label}</span>
          </div>
        `;

        modalList.appendChild(article);
      });

      modal.showModal();
    }

    function createMonth(monthIndex) {
      const monthNumber = monthIndex + 1;
      const firstDate = new Date(CURRENT_YEAR, monthIndex, 1);
      const totalDays = new Date(CURRENT_YEAR, monthIndex + 1, 0).getDate();

      // JS empieza la semana en domingo. Lo convertimos para que lunes sea 0.
      const startOffset = (firstDate.getDay() + 6) % 7;

      const monthCard = document.createElement('article');
      monthCard.className = 'month';

      const title = document.createElement('h2');
      title.textContent = MONTHS[monthIndex];
      monthCard.appendChild(title);

      const weekdayRow = document.createElement('div');
      weekdayRow.className = 'weekdays';

      WEEKDAYS.forEach(day => {
        const cell = document.createElement('div');
        cell.textContent = day;
        weekdayRow.appendChild(cell);
      });

      monthCard.appendChild(weekdayRow);

      const daysGrid = document.createElement('div');
      daysGrid.className = 'days';

      for (let i = 0; i < startOffset; i++) {
        const empty = document.createElement('div');
        empty.className = 'day empty';
        daysGrid.appendChild(empty);
      }

      for (let day = 1; day <= totalDays; day++) {
        const dayCell = document.createElement('button');
        dayCell.className = 'day';
        dayCell.type = 'button';

        const isToday =
          TODAY.getFullYear() === CURRENT_YEAR &&
          TODAY.getMonth() === monthIndex &&
          TODAY.getDate() === day;

        if (isToday) dayCell.classList.add('today');

        const number = document.createElement('span');
        number.className = 'number';
        number.textContent = day;
        dayCell.appendChild(number);

        const events = getEventsForDay(day, monthNumber);

        if (events.length) {
          dayCell.classList.add('has-events');

          const eventBox = document.createElement('div');
          eventBox.className = 'events';

          events.forEach(event => {
            const typeInfo = getTypeInfo(event.type);
            const universeInfo = getUniverseInfo(event.universe);

            const eventLabel = document.createElement('span');
            eventLabel.className = `event ${event.type} ${universeInfo.className}`;
            eventLabel.dataset.type = event.type;
            eventLabel.dataset.universe = event.universe;
            eventLabel.dataset.name = event.name;
            eventLabel.dataset.note = event.note || '';

            eventLabel.innerHTML = `
              <span class="universe-badge" title="${universeInfo.label}">${universeInfo.icon}</span>
              <span class="event-name">${typeInfo.icon} ${event.name}</span>
            `;

            eventBox.appendChild(eventLabel);
          });

          dayCell.appendChild(eventBox);
          dayCell.addEventListener('click', () => openDayModal(day, monthNumber, events));
        }

        daysGrid.appendChild(dayCell);
      }

      monthCard.appendChild(daysGrid);
      return monthCard;
    }

    const isMobileView = window.matchMedia('(max-width: 980px)').matches;
    let viewMode = isMobileView ? 'month' : 'all';
    let activeMonthIndex = TODAY.getMonth();

    function updateMonthControls() {
      activeMonthLabel.textContent = MONTHS[activeMonthIndex].charAt(0).toUpperCase() + MONTHS[activeMonthIndex].slice(1);
      const isMonthView = viewMode === 'month';
      calendar.classList.toggle('single-month', isMonthView);
      Array.from(calendar.children).forEach((monthCard, index) => {
        monthCard.hidden = isMonthView && index !== activeMonthIndex;
      });
      viewModeButton.textContent = isMonthView ? 'Vista anual' : 'Vista mes';
      prevMonth.style.display = isMonthView ? 'inline-flex' : 'none';
      nextMonth.style.display = isMonthView ? 'inline-flex' : 'none';
      activeMonthLabel.style.display = isMonthView ? 'inline-flex' : 'none';
    }

    function changeMonth(offset) {
      activeMonthIndex = (activeMonthIndex + offset + 12) % 12;
      updateMonthControls();
    }

    function renderCalendar() {
      calendar.innerHTML = '';
      MONTHS.forEach((_, index) => calendar.appendChild(createMonth(index)));
      applyFilters();
      updateMonthControls();
    }

    window.addEventListener('resize', () => {
      const mobile = window.matchMedia('(max-width: 980px)').matches;
      if (mobile && viewMode === 'all') {
        viewMode = 'month';
        updateMonthControls();
      }
    });

    function applyFilters() {
      const selectedType = typeFilter.value;
      const selectedUniverse = universeFilter.value;
      const search = normalizeText(searchInput.value.trim());

      document.querySelectorAll('.event').forEach(eventElement => {
        const type = eventElement.dataset.type;
        const universe = eventElement.dataset.universe;
        const text = normalizeText(`${eventElement.dataset.name} ${eventElement.dataset.note}`);

        const typeMatches = selectedType === 'all' || type === selectedType;
        const universeMatches = selectedUniverse === 'all' || universe === selectedUniverse;
        const searchMatches = !search || text.includes(search);

        eventElement.classList.toggle('hidden-by-filter', !(typeMatches && universeMatches && searchMatches));
      });
    }

    typeFilter.addEventListener('change', applyFilters);
    universeFilter.addEventListener('change', applyFilters);
    searchInput.addEventListener('input', applyFilters);
    viewModeButton.addEventListener('click', () => {
      viewMode = viewMode === 'all' ? 'month' : 'all';
      updateMonthControls();
    });
    prevMonth.addEventListener('click', () => changeMonth(-1));
    nextMonth.addEventListener('click', () => changeMonth(1));

    closeModal.addEventListener('click', () => modal.close());

    modal.addEventListener('click', event => {
      const modalCard = event.target.closest('.modal-card');
      if (!modalCard) modal.close();
    });

    renderCalendar();
  </script>
