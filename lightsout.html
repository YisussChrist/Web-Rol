<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luces Fuera • Puzzle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            background: linear-gradient(180deg, #0a0a1f 0%, #1a0033 100%);
            font-family: 'Press Start 2P', system-ui;
            color: white;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-width: 360px;
            margin: 0 auto;
        }
        
        .light {
            width: 100px;
            height: 100px;
            border-radius: 9999px;
            background: #1f1f3f;
            border: 6px solid #444;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        
        .light.on {
            background: #ffeb3b;
            box-shadow: 0 0 40px #ffeb3b, inset 0 0 30px #fff;
            border-color: #ffeb3b;
            color: #000;
        }
        
        .light:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body class="min-h-screen py-12">
    <div class="max-w-md mx-auto text-center">
        <h1 class="text-5xl mb-2 tracking-widest">LUCES FUERA</h1>
        <p class="text-yellow-300 mb-8">Apaga todas las luces</p>
        
        <div class="mb-8">
            <div id="grid" class="grid"></div>
        </div>
        
        <div class="flex gap-4 justify-center mb-8">
            <button onclick="reiniciar()" 
                    class="px-8 py-4 bg-red-600 hover:bg-red-700 rounded-2xl font-bold text-lg">
                🔄 REINICIAR
            </button>
            <button onclick="nuevoNivel()" 
                    class="px-8 py-4 bg-purple-600 hover:bg-purple-700 rounded-2xl font-bold text-lg">
                🎲 NUEVO NIVEL
            </button>
        </div>
        
        <div class="text-sm text-gray-400">
            Movimientos: <span id="movimientos" class="font-bold text-cyan-400">0</span><br>
            <span id="mensaje" class="text-green-400 font-bold"></span>
        </div>
    </div>

    <script>
        let luces = Array(9).fill(false); // false = apagada
        let movimientos = 0;
        
        function crearGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            for (let i = 0; i < 9; i++) {
                const light = document.createElement('div');
                light.className = `light ${luces[i] ? 'on' : ''}`;
                light.textContent = luces[i] ? '💡' : '🌑';
                light.onclick = () => pulsar(i);
                grid.appendChild(light);
            }
        }
        
        function pulsar(pos) {
            const posiciones = [
                pos,
                pos - 3, // arriba
                pos + 3, // abajo
                pos - 1, // izquierda (si no está en borde)
                pos + 1  // derecha
            ];
            
            posiciones.forEach(p => {
                if (p >= 0 && p < 9) {
                    // Evitar cruzar bordes en izquierda/derecha
                    if ((pos % 3 === 0 && p === pos - 1) || 
                        (pos % 3 === 2 && p === pos + 1)) return;
                    luces[p] = !luces[p];
                }
            });
            
            movimientos++;
            document.getElementById('movimientos').textContent = movimientos;
            crearGrid();
            verificarVictoria();
        }
        
        function verificarVictoria() {
            if (luces.every(l => !l)) {
                document.getElementById('mensaje').textContent = '¡GANASTE! 🎉';
                setTimeout(() => alert(`¡Perfecto! Lo resolviste en ${movimientos} movimientos.`), 300);
            }
        }
        
        function reiniciar() {
            // Reinicia con el mismo patrón actual
            movimientos = 0;
            document.getElementById('movimientos').textContent = 0;
            document.getElementById('mensaje').textContent = '';
            crearGrid();
        }
        
        function nuevoNivel() {
            // Genera un patrón aleatorio (aprox. 4-6 luces encendidas)
            luces = Array(9).fill(false);
            for (let i = 0; i < 9; i++) {
                if (Math.random() > 0.45) luces[i] = true;
            }
            movimientos = 0;
            document.getElementById('movimientos').textContent = 0;
            document.getElementById('mensaje').textContent = '';
            crearGrid();
        }
        
        // Iniciar con un nivel interesante
        window.onload = () => {
            // Patrón inicial chulo
            luces = [true, false, true,
                     false, true, false,
                     true, false, true];
            crearGrid();
        };
    </script>
</body>
</html>
