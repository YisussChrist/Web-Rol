<style>
/* === Reset & Variables === */
:root {
  --bg: #0b0b12;
  --bg-soft: #12121a;
  --card: #151826;
  --text: #e6e6ef;
  --muted: #9aa0ae;
  --accent: #a78bfa;
  --accent-2: #22d3ee;
  --ring: rgba(167,139,250,0.5);
  --radius: 14px;
  --radius-lg: 20px;
  --shadow: 0 10px 30px rgba(0,0,0,.35);
  --glass: rgba(255,255,255,0.04);
}

body.light-mode {
  --bg: #f6f7fb;
  --bg-soft: #ffffff;
  --card: #ffffff;
  --text: #1b1e2b;
  --muted: #5b6273;
  --accent: #6366f1;
  --accent-2: #06b6d4;
  --ring: rgba(99,102,241,0.25);
  --shadow: 0 12px 28px rgba(16,24,40,0.08);
  --glass: rgba(0,0,0,0.03);
}

* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  color: var(--text);
  background:
    radial-gradient(1200px 600px at 10% -10%, rgba(99,102,241,.18), transparent 60%),
    radial-gradient(1200px 600px at 110% 10%, rgba(34,211,238,.22), transparent 60%),
    var(--bg);
  background-attachment: fixed;
  transition: background .4s ease, color .2s ease;
}

/* === Appbar === */
.appbar {
  position: sticky; top: 0; z-index: 50;
  backdrop-filter: saturate(150%) blur(10px);
  background: linear-gradient(180deg, rgba(0,0,0,.25), transparent);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  padding: 10px clamp(12px, 2.5vw, 22px);
}
.brand {
  font-weight: 800; font-size: clamp(18px, 2vw, 22px); letter-spacing: .3px;
}
.appbar-main { margin-top: 10px; display: grid; gap: 12px; grid-template-columns: 1fr auto; align-items: center; }

.search-wrap { position: relative; display: flex; align-items: center; }
#global-search {
  width: 100%; border: 1.5px solid transparent; padding: 12px 42px 12px 14px;
  border-radius: 12px; background: var(--glass); color: var(--text);
  outline: none; transition: .2s ease; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
}
#global-search:focus { border-color: var(--ring); box-shadow: 0 0 0 3px var(--ring); }
#clear-search {
  position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
  border: none; background: transparent; color: var(--muted); padding: 6px 10px; border-radius: 10px; cursor: pointer;
}
#clear-search:hover { color: var(--text); }

.controls { display: flex; align-items: center; gap: 10px; }
.select-wrap select {
  appearance: none; border-radius: 10px; border: 1px solid rgba(255,255,255,0.12);
  background: var(--glass); color: var(--text); padding: 10px 12px;
}
.icon-btn {
  border: 1px solid rgba(255,255,255,0.12); background: var(--glass);
  border-radius: 12px; padding: 10px 12px; cursor: pointer;
}
.icon-btn:hover { box-shadow: 0 0 0 3px var(--ring); }
.ghost { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: var(--muted); padding: 8px 10px; border-radius: 10px; }
.ghost.small { font-size: .85rem; padding: 6px 8px; }

/* Chips */
.chip-group { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.chip {
  border: 1px solid rgba(255,255,255,0.12); background: var(--glass); color: var(--text);
  padding: 8px 12px; border-radius: 999px; cursor: pointer; transition: .15s ease; font-weight: 700;
}
.chip.active { background: linear-gradient( to right, var(--accent), var(--accent-2)); color: #fff; border-color: transparent; }
.chip:focus-visible { outline: 3px solid var(--ring); outline-offset: 2px; }

/* Stats bar */
#stats-bar {
  width: min(1100px, 92vw); margin: 10px auto 0; display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  background: var(--glass); border: 1px solid rgba(255,255,255,0.12); border-radius: var(--radius); padding: 10px 12px;
}
#stats-bar .stat { color: var(--muted); }
#stats-bar .badges { display: flex; gap: 6px; margin-left: auto; }
.badge { padding: 4px 8px; border-radius: 999px; font-weight: 700; font-size: .8rem; color: #0b0b12; }
.badge.ok { background: #86efac; }
.badge.warn { background: #fde68a; }
.badge.err { background: #fca5a5; }

/* Container & cards */
.container { width: min(1100px, 92vw); margin: 18px auto; display: grid; gap: 18px; }
.scale-card, #characters-list {
  background: var(--card); border: 1px solid rgba(255,255,255,0.12); border-radius: var(--radius-lg);
  padding: 18px; box-shadow: var(--shadow);
}

.list-header { display: flex; justify-content: space-between; align-items: center; gap: 10px; }

/* Scale */
.scale { position: relative; height: 56px; margin: 1rem 0 1.5rem; }
.scale-line { position: absolute; top: 50%; transform: translateY(-50%); height: 4px; background: linear-gradient(90deg, var(--accent), var(--accent-2)); width: 100%; border-radius: 999px; }
.labels { display: flex; justify-content: space-between; font-size: .95rem; color: var(--muted); margin-top: 0.25rem; }
.scale-note { color: var(--muted); margin-top: .25rem; }

.character { position: absolute; top: 50%; transform: translateY(-50%); width: 44px; height: 44px; margin-left: -22px; }
.character img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); box-shadow: 0 4px 10px rgba(0,0,0,.35); }

/* List */
#character-list { list-style: none; padding: 0; margin: 1.5rem 0 0; display: grid; gap: 10px; }
.character-item {
  display: grid; grid-template-columns: 52px 1fr auto; gap: 10px; align-items: center;
  background: linear-gradient(to bottom right, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
  border: 1px solid rgba(255,255,255,0.12); border-radius: 14px; padding: 10px;
}
.character-item img { width: 52px; height: 52px; object-fit: cover; border-radius: 50%; border: 2px solid rgba(255,255,255,0.12); }
.character-item .meta { display: flex; flex-direction: column; }
.character-item .name { font-weight: 700; }
.character-item .power { color: var(--muted); font-size: .9rem; }
.character-item .actions { display: flex; gap: 8px; }

.toggle-button, #character-list > button {
  background: var(--glass); color: var(--text); border: 1px solid rgba(255,255,255,0.12);
  font-size: .9rem; padding: 8px 10px; cursor: pointer; border-radius: 10px; transition: transform .15s ease;
}
.toggle-button:hover, #character-list > button:hover { transform: translateY(-2px); }

.transformation { margin-top: 8px; display: grid; gap: 8px; }
.transformation.hidden { display: none; }
.transformation-item {
  display: grid; grid-template-columns: 44px 1fr; gap: 8px; align-items: center;
  padding: 8px; border-radius: 12px; background: var(--bg-soft); border: 1px solid rgba(255,255,255,0.06);
}
.transformation-item img { width: 44px; height: 44px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.12); }

/* Scroll-to-top */
.icon-fab {
  position: fixed; bottom: 18px; right: 18px; z-index: 40;
  width: 42px; height: 42px; border-radius: 50%; display: grid; place-items: center;
  background: var(--accent); color: #fff; border: none; box-shadow: var(--shadow);
  transform: translateY(80px); opacity: 0; transition: .25s ease; cursor: pointer;
}
.icon-fab.show { transform: translateY(0); opacity: 1; }

/* Utility */
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

img { image-rendering: -webkit-optimize-contrast; }

/* === Nueva escala de poder === */
.power-rail {
  position: relative;
  height: 90px;
  margin: 2rem 0;
}

.rail {
  position: absolute;
  top: 50%;
  left: 0;
  right: 0;
  height: 6px;
  border-radius: 999px;
  background: linear-gradient(
    90deg,
    #22d3ee,
    #6366f1,
    #a78bfa
  );
  transform: translateY(-50%);
  box-shadow: 0 0 12px rgba(167,139,250,.6);
}

.rail-label {
  position: absolute;
  top: 100%;
  margin-top: 8px;
  font-size: .85rem;
  color: var(--muted);
}

.rail-label.min { left: 0; }
.rail-label.max { right: 0; }

.power-node {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: var(--card);
  border: 3px solid var(--accent);
  box-shadow: 0 6px 18px rgba(0,0,0,.4);
  z-index: 2;
}

.power-node img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
}



/* Avatares sin imágenes */
.avatar, .power-avatar {
  display: inline-grid;
  place-items: center;
  border-radius: 50%;
  font-weight: 800;
  user-select: none;
  text-transform: uppercase;
  letter-spacing: .3px;
  color: var(--text);
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.22), transparent 35%),
    linear-gradient(135deg, var(--accent), var(--accent-2));
  border: 2px solid rgba(255,255,255,0.14);
  box-shadow: 0 6px 18px rgba(0,0,0,.18);
}
.character-item .avatar { width: 52px; height: 52px; font-size: 1rem; }
.transformation-item .avatar { width: 44px; height: 44px; font-size: .85rem; }
.power-node .power-avatar { width: 100%; height: 100%; font-size: .75rem; }

/* Mejoras responsive */
@media (max-width: 900px) {
  .appbar-main { grid-template-columns: 1fr; }
  .controls { flex-wrap: wrap; }
}

@media (max-width: 640px) {
  .appbar { padding: 10px 12px; }
  .brand { font-size: 1.05rem; }
  .search-wrap, .controls, .select-wrap, .select-wrap select { width: 100%; }
  .controls { gap: 8px; }
  .chip-group { width: 100%; }
  .chip { flex: 1 1 calc(50% - 8px); justify-content: center; text-align: center; }
  .scale-card, #characters-list { padding: 14px; }
  .list-header { flex-direction: column; align-items: stretch; }
  .list-header h2 { margin: 0; }
  .character-item {
    grid-template-columns: 44px 1fr;
    gap: 10px;
  }
  .character-item .avatar { width: 44px; height: 44px; font-size: .9rem; }
  .character-item .actions {
    grid-column: 1 / -1;
    width: 100%;
  }
  .toggle-button { width: 100%; }
  .power-rail { height: 80px; margin: 1.25rem 0; }
  .power-node { width: 38px; height: 38px; }
  #stats-bar { padding: 10px; gap: 8px; }
  #stats-bar .badges { margin-left: 0; width: 100%; }
}

@media (max-width: 420px) {
  .chip { flex-basis: 100%; }
  .character-item { padding: 9px; }
  .meta .name { font-size: .96rem; word-break: break-word; }
  .meta .power { font-size: .85rem; }
}

</style>

function initialsFromName(name) {
  const clean = (name || '').trim().split(/\s+/).filter(Boolean);
  if (!clean.length) return '?';
  if (clean.length === 1) return clean[0].slice(0, 2).toUpperCase();
  return (clean[0][0] + clean[1][0]).toUpperCase();
}

function makeAvatar(name, cls='avatar') {
  const el = document.createElement('div');
  el.className = cls;
  el.setAttribute('aria-label', name || 'Avatar');
  el.title = name || '';
  el.textContent = initialsFromName(name);
  return el;
}

  <script>
// === Helpers ===
const $ = (s, ctx=document) => ctx.querySelector(s);
const $$ = (s, ctx=document) => Array.from(ctx.querySelectorAll(s));
const norm = s => (s||"").toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();

// Persisted theme
const THEME_KEY = "ef_theme";

// Format numbers: 1.2K / 3.4M / 5.6B
function formatNumber(num) {
  if (num === "???" || Number.isNaN(num)) return "???";
  if (num >= 1e12) return (num / 1e12).toFixed(1).replace(/\.0$/, '') + 'T';
  if (num >= 1e9)  return (num / 1e9).toFixed(1).replace(/\.0$/, '') + 'B';
  if (num >= 1e6)  return (num / 1e6).toFixed(1).replace(/\.0$/, '') + 'M';
  if (num >= 1e3)  return (num / 1e3).toFixed(1).replace(/\.0$/, '') + 'K';
  return num;
}

// Clean & normalize original data once
function normalizeData(list) {
  return list.map(c => {
    const cc = { ...c };
    const parsed = parseInt(cc.strength);
    cc.strength = isNaN(parsed) ? "???" : parsed;
    if (Array.isArray(cc.transformations)) {
      cc.transformations = cc.transformations.map(t => {
        const tt = { ...t };
        const pt = parseInt(tt.strength);
        tt.strength = isNaN(pt) ? "???" : pt;
        return tt;
      });
    }
    return cc;
  });
}

let DATA = normalizeData(characters);
let FILTERED = [...DATA];
let shownCount = 20;

// === UI wiring ===
const searchInput = $("#global-search");
const clearBtn = $("#clear-search");
const chipsWrap = $("#range-chips");
const sortSelect = $("#sort-select");
const statsBar = $("#stats-bar");
const toTop = $("#scroll-top");
const collapseAllBtn = $("#collapse-all");

// Theme
const themeBtn = $("#theme-toggle");
function setTheme(mode){
  const body = document.body;
  body.classList.remove("light-mode","dark-mode");
  body.classList.add(mode);
  themeBtn.setAttribute("aria-pressed", mode==="dark-mode" ? "true":"false");
  themeBtn.textContent = mode==="dark-mode" ? "☀️" : "🌙";
  try { localStorage.setItem(THEME_KEY, mode); } catch(e){}
}
function toggleTheme(){
  const isDark = document.body.classList.contains("dark-mode");
  setTheme(isDark ? "light-mode" : "dark-mode");
}
themeBtn?.addEventListener("click", toggleTheme);
(() => {
  const saved = (localStorage.getItem(THEME_KEY)||"").trim();
  if (saved==="dark-mode"||saved==="light-mode") setTheme(saved); else setTheme("light-mode");
})();

// Search & filter state
const activeRanges = new Set();

function inRange(val, rangeKey) {
  if (val === "???") return rangeKey==="unknown";
  const n = val;
  switch(rangeKey){
    case "lt1m": return n < 1e6;
    case "1to10": return n >= 1e6 && n < 1e7;
    case "10to100": return n >= 1e7 && n < 1e8;
    case "100plus": return n >= 1e8;
    case "unknown": return false; // handled above
  }
  return true;
}

function runSearchAndFilter(){
  const q = norm(searchInput?.value || "");
  FILTERED = DATA.filter(c => {
    // name or transformations match?
    const baseText = c.name + " " + (Array.isArray(c.transformations) ? c.transformations.map(t=>t.name).join(" ") : "");
    const hay = norm(baseText);
    const hit = !q || hay.includes(q);

    // range chips
    let rangeOk = true;
    if (activeRanges.size>0) {
      let ok = false;
      for (const key of activeRanges) {
        if (key==="unknown") {
          if (c.strength==="???") { ok = true; break; }
        } else if (inRange(c.strength, key)) { ok = true; break; }
      }
      rangeOk = ok;
    }
    return hit && rangeOk;
  });

  // sort
  if (sortSelect.value==="az") {
    FILTERED.sort((a,b)=> a.name.localeCompare(b.name));
  } else {
    // strength desc, "???" at the end
    FILTERED.sort((a,b)=> (b.strength==="???")-(a.strength==="???") || (b.strength||0) - (a.strength||0));
  }

  shownCount = 20;
  renderList();
  renderScale();
  updateStats();
}

searchInput?.addEventListener("input", runSearchAndFilter);
clearBtn?.addEventListener("click", ()=>{ searchInput.value=""; runSearchAndFilter(); searchInput.focus(); });

// "/" to focus search, "t" to toggle theme
document.addEventListener("keydown", (e)=>{
  const tag = (e.target.tagName||"").toLowerCase();
  if (e.key === "/" && !["input","textarea","select"].includes(tag)) { e.preventDefault(); searchInput?.focus(); }
  if (e.key.toLowerCase()==="t" && !["input","textarea","select"].includes(tag)) { e.preventDefault(); toggleTheme(); }
});

// Chips
chipsWrap?.addEventListener("click", (e)=>{
  const btn = e.target.closest(".chip");
  if (!btn) return;
  const key = btn.dataset.range;
  if (activeRanges.has(key)) {
    activeRanges.delete(key);
    btn.classList.remove("active");
    btn.setAttribute("aria-pressed","false");
  } else {
    activeRanges.add(key);
    btn.classList.add("active");
    btn.setAttribute("aria-pressed","true");
  }
  runSearchAndFilter();
});

sortSelect?.addEventListener("change", runSearchAndFilter);

// Stats
function avg(nums) {
  const arr = nums.filter(n => n!=="???");
  if (!arr.length) return 0;
  return Math.round(arr.reduce((a,b)=>a+b,0) / arr.length);
}

function updateStats(){
  const total = FILTERED.length;
  const visibleTopScale = Math.min(20, FILTERED.filter(c => c.strength!=="???").length);
  const avgPower = avg(FILTERED.map(c=>c.strength));

  statsBar.innerHTML = `
    <div class="stat">Personajes: <strong>${total}</strong></div>
    <div class="stat">En escala: <strong>${visibleTopScale}</strong></div>
    <div class="stat">Fuerza media: <strong>${formatNumber(avgPower)}</strong></div>
    <div class="badges">
      <span class="badge ok">OK</span>
      <span class="badge warn">Filtro</span>
      <span class="badge err">???</span>
    </div>
  `;
}

// Render list
function renderList(){
  const ul = $("#character-list");
  ul.innerHTML = "";

  FILTERED.slice(0, shownCount).forEach(character => {
    const li = document.createElement("li");
    li.className = "character-item";

    const img = makeAvatar(character.name, "avatar");

    const meta = document.createElement("div");
    meta.className = "meta";
    meta.innerHTML = `<div class="name">${character.name}</div><div class="power">Fuerza: ${formatNumber(character.strength==="???"?0:character.strength)}${character.strength==="???"?" (???)":""}</div>`;

    const actions = document.createElement("div");
    actions.className = "actions";

    // Transformations
    if (Array.isArray(character.transformations) && character.transformations.length) {
      const toggle = document.createElement("button");
      toggle.textContent = "Mostrar transformaciones";
      toggle.className = "toggle-button";

      const tContainer = document.createElement("div");
      tContainer.className = "transformation hidden";

      character.transformations.forEach(t => {
        const tDiv = document.createElement("div");
        tDiv.className = "transformation-item";
        const tImg = makeAvatar(t.name, "avatar");
        const tMeta = document.createElement("div");
        tMeta.innerHTML = `<strong>${t.name}</strong> — ${t.strength==="???" ? "Fuerza: ???" : "Fuerza: " + formatNumber(t.strength)}`;
        tDiv.appendChild(tImg); tDiv.appendChild(tMeta);
        tContainer.appendChild(tDiv);
      });

      toggle.onclick = () => {
        tContainer.classList.toggle("hidden");
        toggle.textContent = tContainer.classList.contains("hidden") ? "Mostrar transformaciones" : "Ocultar transformaciones";
      };

      actions.appendChild(toggle);
      li.appendChild(img); li.appendChild(meta); li.appendChild(actions); li.appendChild(tContainer);
    } else {
      li.appendChild(img); li.appendChild(meta);
    }

    ul.appendChild(li);
  });

  if (shownCount < FILTERED.length) {
    const btn = document.createElement("button");
    btn.textContent = "Mostrar más";
    btn.onclick = () => { shownCount += 20; renderList(); };
    ul.appendChild(btn);
  }
}

// Render scale (top 20 by current order, ignoring strength "???")
function renderScale() {
  const rail = document.querySelector(".power-rail");
  if (!rail) return;

  rail.querySelectorAll(".power-node").forEach(n => n.remove());

  const visible = FILTERED
    .filter(c => typeof c.strength === "number" && c.strength > 0)
    .slice(0, 20);

  if (!visible.length) return;

  // Escala logarítmica
  const values = visible.map(c => c.strength);
  const min = Math.min(...values);
  const max = Math.max(...values);

  const logMin = Math.log10(min);
  const logMax = Math.log10(max);

  visible.forEach(c => {
    const logVal = Math.log10(c.strength);
    const percent =
      ((logVal - logMin) / (logMax - logMin)) * 100;

    const node = document.createElement("div");
    node.className = "power-node";
    node.style.left = `${percent}%`;
    node.title = `${c.name} — ${formatNumber(c.strength)}`;

    const avatar = makeAvatar(c.name, "power-avatar");

    node.appendChild(avatar);
    rail.appendChild(node);
  });
}


// Collapse-all transformations
collapseAllBtn?.addEventListener("click", ()=>{
  $$(".transformation").forEach(t => t.classList.add("hidden"));
  $$(".toggle-button").forEach(btn => btn.textContent = "Mostrar transformaciones");
});

// Scroll-to-top
window.addEventListener("scroll", ()=>{
  if (window.scrollY > 600) toTop.classList.add("show"); else toTop.classList.remove("show");
});
toTop?.addEventListener("click", ()=> window.scrollTo({top:0, behavior:"smooth"}));

// Init
runSearchAndFilter();

</script>
